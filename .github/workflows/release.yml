name: Publish Release

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  file-changes:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.check.outputs.any_changed }}
      docs: ${{ steps.docs.outputs.any_changed }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Get changed files
        id: check
        uses: tj-actions/changed-files@4f892cd56345d721bac7139000c4b4a22c8f138f
        with:
          files: |
            .github/workflows/release.yml
            build.gradle.kts
            gradle/*.versions.toml
            gradle/kotlin-js-store/**
            **/client/web/**
            **/client/ui/**
            **/client/core/**
            **/client/data-models/**
            **/server/**
            Dockerfile
            Dockerfile-local
      - name: Get changed files
        id: docs
        uses: tj-actions/changed-files@4f892cd56345d721bac7139000c4b4a22c8f138f
        with:
          files: |
            .github/workflows/release.yml
            docs/**/**/*.md
            mkdocs.yml

  publish-docs:
    runs-on: ubuntu-latest
    needs: [ file-changes ]
    if: needs.file-changes.outputs.docs == 'true' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755
        with:
          python-version: '3.14'
          architecture: x64
          cache: 'pip'
          cache-dependency-path: 'docs/requirements.txt'
      - name: Install Python dependencies
        run: python3 -m pip install -r ./docs/requirements.txt
      - name: Deploy with mike (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v} mike deploy --update-aliases --push ${{ github.ref_name }} latest
      - name: Deploy with mike (snapshot)
        if: startsWith(github.ref, 'refs/tags/v') == false
        run: |
          VERSION=1.0.0-SNAPSHOT mike deploy --update-aliases --push v1.0.0-SNAPSHOT dev-snapshot

  build-and-push-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    needs: [ file-changes ]
    if: needs.file-changes.outputs.any == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          submodules: 'recursive'

      - uses: actions/setup-java@d81c4e45f3ac973cc936d79104023e20054ba578
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@576fcbecfed70890e466eeffd7c78d93b30b0472

      - name: Cache Build files
        uses: actions/cache@565629816435f6c0b50676926c9b05c254113c0c
        with:
          path: |
            ~/.konan
            ~/.gradle
          key: ${{ runner.os }}-${{ hashFiles('gradle.properties') }}-v2

      - name: Build Server and Web Client
        run: >
          ./gradlew
          :server:application:installShadowDist
          :server:application:shadowDistZip
          :server:application:shadowDistTar

      - name: Container registry Log in
        uses: docker/login-action@0567fa5ae8c9a197cb207537dc5cbb43ca3d803f
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@b13d25e5fcf2e04305d8aedc9a6c28ebe258e934
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch,enable=${{ startsWith(github.ref, 'refs/tags/v') == false }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@dbac3ca1e5410ec04d2cce48cfbcfa3175fb8f4f
        with:
          context: .
          file: Dockerfile-local
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Upload build to Github Release
        uses: softprops/action-gh-release@e798e6a1ede8d07b74ac4cdac6bdfa4cc1653907
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            server/application/build/distributions/*.zip
            server/application/build/distributions/*.tar
