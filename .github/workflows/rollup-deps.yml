name: Rollup Dependency PRs

on:
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: 'Comma-separated PR numbers (e.g., 42,43,44). Leave empty to include all open Renovate PRs.'
        required: false
        type: string
      title:
        description: 'Title for the roll-up PR'
        required: false
        type: string
        default: 'chore(deps): rollup dependency updates'

permissions:
  contents: write
  pull-requests: write

jobs:
  rollup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:

      - name: Validate token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAT_TOKEN secret is not set. A Personal Access Token with the 'workflow' scope is required to push commits that modify workflow files."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Resolve PR list
        id: resolve
        env:
          INPUT_PR_NUMBERS: ${{ inputs.pr_numbers }}
        run: |
          if [ -n "$INPUT_PR_NUMBERS" ]; then
            echo "prs=$INPUT_PR_NUMBERS" >> "$GITHUB_OUTPUT"
          else
            prs=$(gh pr list --author "renovate[bot]" --state open --json number --jq '[.[].number] | join(",")')
            if [ -z "$prs" ]; then
              echo "::error::No open Renovate PRs found"
              exit 1
            fi
            echo "Auto-detected open Renovate PRs: $prs"
            echo "prs=$prs" >> "$GITHUB_OUTPUT"
          fi

      - name: Create rollup branch and cherry-pick
        env:
          PR_LIST: ${{ steps.resolve.outputs.prs }}
          PR_TITLE: ${{ inputs.title }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          BRANCH="rollup/deps-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          IFS=',' read -ra PRS <<< "$PR_LIST"
          BODY="## Rolled-up PRs"$'\n\n'

          for pr_num in "${PRS[@]}"; do
            pr_num=$(echo "$pr_num" | xargs)
            echo "::group::Processing PR #${pr_num}"

            pr_info=$(gh pr view "$pr_num" --json title,headRefName,state,commits)
            pr_state=$(echo "$pr_info" | jq -r '.state')
            pr_title=$(echo "$pr_info" | jq -r '.title')
            head_ref=$(echo "$pr_info" | jq -r '.headRefName')

            if [ "$pr_state" != "OPEN" ]; then
              echo "::warning::PR #${pr_num} is ${pr_state}, skipping"
              echo "::endgroup::"
              continue
            fi

            echo "PR #${pr_num}: ${pr_title} (branch: ${head_ref})"
            git fetch origin "$head_ref"

            commits=$(echo "$pr_info" | jq -r '.commits[].oid')
            for commit in $commits; do
              echo "Cherry-picking $commit"
              if ! git cherry-pick "$commit"; then
                echo "::error::Cherry-pick conflict on commit $commit from PR #${pr_num}. Aborting."
                git cherry-pick --abort
                exit 1
              fi
            done

            BODY+="- #${pr_num} — ${pr_title}"$'\n'
            echo "::endgroup::"
          done

          if [ "$(git rev-list --count origin/main..HEAD)" -eq 0 ]; then
            echo "::error::No commits were cherry-picked"
            exit 1
          fi

          git push origin "$BRANCH"

          BODY+=$'\n'"---"$'\n'"*Created by @${ACTOR} via rollup workflow*"$'\n'

          gh pr create \
            --title "$PR_TITLE" \
            --body "$BODY"