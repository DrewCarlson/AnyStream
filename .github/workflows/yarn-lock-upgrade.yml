name: Yarn Lock Sync

on:
  push:
    branches:
      - 'renovate/**'

concurrency:
  group: yarn-upgrade-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  yarn-lock-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          submodules: 'recursive'

      - uses: actions/setup-java@1d018f9b8b9b505bb578a83b230fabcce01af93b
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39bfbcf1a94523e6d06f556c316ea9e8e69ecb82

      - name: Cache Build files
        uses: actions/cache@565629816435f6c0b50676926c9b05c254113c0c
        if: ${{ !startsWith(matrix.os, 'windows') }}
        with:
          path: |
            ~/.konan
            ~/.gradle
          key: ${{ runner.os }}-${{ hashFiles('gradle.properties') }}-v2

      - name: Yarn Lock Upgrade
        run: ./gradlew kotlinUpgradeYarnLock

      - uses: EndBug/add-and-commit@1539a6ad10f4790cad9ee6401eedc0cc0b70f44f
        with:
          author_name: renovate[bot]
          author_email: 29139614+renovate[bot]@users.noreply.github.com
          message: Upgrade yarn.lock file
